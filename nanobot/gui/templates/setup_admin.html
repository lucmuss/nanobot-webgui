{% extends "base.html" %}
{% block body %}
  <p class="muted">First launch. Create exactly one admin account for this dev instance.</p>
  {% if error %}<div class="error" data-testid="page-error">{{ error }}</div>{% endif %}
  <form method="post" action="/setup/admin" data-testid="admin-setup-form">
    <label>
      Username
      <input type="text" name="username" value="{{ form_data.username if form_data else '' }}" required data-testid="admin-setup-username">
    </label>
    <label>
      Email
      <input type="email" name="email" value="{{ form_data.email if form_data else '' }}" required data-testid="admin-setup-email">
    </label>
    <label>
      Password
      <input type="password" name="password" required data-testid="admin-setup-password">
    </label>
    <label>
      Confirm password
      <input type="password" name="password_confirm" required data-testid="admin-setup-password-confirm">
    </label>
    <div class="actions">
      <button type="submit" data-testid="admin-setup-submit">Create Admin</button>
    </div>
  </form>
{% endblock %}
