{% extends "base.html" %}
{% block body %}
  <p class="muted">Sign in with your username or email address.</p>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="post" action="/login">
    <label>
      Username or email
      <input type="text" name="identifier" value="{{ form_data.identifier if form_data else '' }}" required>
    </label>
    <label>
      Password
      <input type="password" name="password" required>
    </label>
    <div class="actions">
      <button type="submit">Sign In</button>
    </div>
  </form>
{% endblock %}
